name: Release Agent

# Crea un release con los binarios compilados cada vez que se hace push de un
# tag con el formato agent-vX.Y.Z (ej: git tag agent-v0.2.0 && git push --tags)
on:
  push:
    tags:
      - 'agent-v*'

permissions:
  contents: write  # necesario para crear releases

jobs:
  build-and-release:
    name: Build & release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/agent/go.mod
          cache-dependency-path: apps/agent/go.sum

      # Resuelve dependencias nuevas (p. ej. golang.org/x/crypto para autocert)
      # y completa go.sum. Se hace en CI porque el entorno de desarrollo no
      # siempre tiene el toolchain de Go para generar go.sum a mano.
      - name: Tidy modules
        working-directory: apps/agent
        run: go mod tidy

      - name: Build binaries
        working-directory: apps/agent
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o bezenti-agent-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w" -o bezenti-agent-linux-arm64 .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/agent/bezenti-agent-linux-amd64
            apps/agent/bezenti-agent-linux-arm64
          generate_release_notes: true

      # Los nodos descargan el binario desde R2 (AGENT_BINARY_URL), no desde
      # GitHub Releases. Subimos a bezenti-releases/agent/<version>/ para que
      # el release quede listo sin paso manual. La versión es el tag sin el
      # prefijo "agent-" (agent-v0.3.2 → v0.3.2).
      - name: Upload binaries to R2
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/agent
        run: |
          VERSION="${GITHUB_REF_NAME#agent-}"
          for arch in amd64 arm64; do
            npx --yes wrangler@4 r2 object put \
              "bezenti-releases/agent/${VERSION}/bezenti-agent-linux-${arch}" \
              --file="bezenti-agent-linux-${arch}" --remote
          done
