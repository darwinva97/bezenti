name: Daily blog post

# Bot diario: Workers AI (Llama) escribe el post es+en, Flux hace la portada,
# se commitea, se despliega y se envía la newsletter. Todo automático.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC = 08:00 Perú
  workflow_dispatch: # disparo manual para probar

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      POST_OUT: /tmp/post.json
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate post (Workers AI)
        id: gen
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node apps/web/scripts/generate-daily-post.mjs

      - name: Commit new post
        if: steps.gen.outputs.generated == 'true'
        run: |
          git config user.name "Bezenti Bot"
          git config user.email "bot@bezenti.com"
          git add apps/web/src/content/posts apps/web/public/images/posts apps/web/scripts/post-queue.json
          git commit -m "post: ${{ steps.gen.outputs.title }} [skip ci]"
          git push origin main

      - name: Build web
        if: steps.gen.outputs.generated == 'true'
        run: pnpm --filter web build

      - name: Deploy to Cloudflare
        if: steps.gen.outputs.generated == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

      # Encola el post en `outbox` (D1) SOLO tras desplegar. El Cron Trigger del
      # Worker (13:30 UTC) lee la cola y envía la newsletter. No llamamos al
      # endpoint público desde Actions (lo bloquea el WAF de la zona).
      - name: Enqueue newsletter
        if: steps.gen.outputs.generated == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACC: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PAYLOAD=$(cat /tmp/post.json)
          BODY=$(jq -n --arg p "$PAYLOAD" --arg t "$(date +%s)000" \
            '{sql:"INSERT INTO outbox (payload, created_at) VALUES (?, ?)", params:[$p,$t]}')
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$ACC/d1/database/91cc0789-0647-45b5-a4b0-2079802a4c80/query" \
            -H "Authorization: Bearer $CF_API_TOKEN" -H "Content-Type: application/json" \
            --data "$BODY" -w "\nHTTP %{http_code}\n"
